<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary meta -->
  <title>{% if is_home %}{{ site.festivalName }} · 13 de juny 2026 · Gaianes (el Comtat){% else %}{{ page_title }} · {{ site.festivalName }}{% endif %}</title>
  <meta name="description" content="{{ site.descriptionLong }}">
  <meta name="author" content="{{ site.organiser }}">
  <link rel="canonical" href="{{ permalink }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.festivalName }}">
  <meta property="og:url" content="{{ permalink }}">
  <meta property="og:title" content="{% if is_home %}{{ site.festivalName }} · 13 de juny 2026 · Gaianes (el Comtat){% else %}{{ page_title }} · {{ site.festivalName }}{% endif %}">
  <meta property="og:description" content="{{ site.descriptionLong }}">
  <meta property="og:image" content="{{ base_url }}img/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Cartell oficial del Benicafest 2026 — 13 de juny a Gaianes, el Comtat. Entrada gratuïta.">
  <meta property="og:locale" content="ca_ES">

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if is_home %}{{ site.festivalName }} · 13 de juny 2026 · Gaianes (el Comtat){% else %}{{ page_title }} · {{ site.festivalName }}{% endif %}">
  <meta name="twitter:description" content="{{ site.descriptionLong }}">
  <meta name="twitter:image" content="{{ base_url }}img/og-image.jpg">

  <!-- JSON-LD structured data (MusicEvent) -->
  {% if is_home %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MusicEvent",
    "name": "{{ site.festivalName }}",
    "description": "{{ site.descriptionLong }}",
    "url": "{{ base_url }}",
    "startDate": "2026-06-13T19:30:00+02:00",
    "endDate": "2026-06-13T23:59:00+02:00",
    "eventStatus": "https://schema.org/EventScheduled",
    "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
    "isAccessibleForFree": true,
    "location": {
      "@type": "Place",
      "name": "Gaianes",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Gaianes",
        "addressRegion": "el Comtat, País Valencià",
        "addressCountry": "ES"
      }
    },
    "organizer": {
      "@type": "Organization",
      "name": "{{ site.organiser }}"
    },
    "image": "{{ base_url }}img/og-image.jpg",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "EUR",
      "validFrom": "2026-01-01",
      "availability": "https://schema.org/InStock",
      "url": "{{ base_url }}"
    },
    "performer": [
      { "@type": "MusicGroup", "name": "Marcel el Marcià" },
      { "@type": "MusicGroup", "name": "Fardatxo" },
      { "@type": "MusicGroup", "name": "Invers" },
      { "@type": "MusicGroup", "name": "The Sgraciats" },
      { "@type": "MusicGroup", "name": "Arre A.K." },
      { "@type": "PerformingGroup", "name": "Muixeranga Penyeta Blanca" }
    ]
  }
  </script>
  {% endif %}

  <!-- Web app manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a4a">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/main.css">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
</head>
<body>
  {% include "partials/nav.html" %}
  <main>
    {% block main %}{% endblock %}
  </main>
  {% include "partials/footer.html" %}
  <script src="/js/main.js"></script>
</body>
</html>
