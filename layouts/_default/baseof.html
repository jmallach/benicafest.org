<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary meta -->
  <title>{{ if .IsHome }}{{ .Site.Params.festivalName }} — Festival de música en valencià a Gaianes{{ else }}{{ .Title }} · {{ .Site.Params.festivalName }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.descriptionLong }}">
  <meta name="author" content="{{ .Site.Params.organiser }}">
  <link rel="canonical" href="{{ .Permalink }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ .Site.Params.festivalName }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Params.festivalName }} — Festival de música en valencià a Gaianes, el Comtat{{ else }}{{ .Title }} · {{ .Site.Params.festivalName }}{{ end }}">
  <meta property="og:description" content="{{ .Site.Params.descriptionLong }}">
  <meta property="og:image" content="{{ "img/og-image.jpg" | absURL }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Cartell oficial del Benicafest 2026 — 13 de juny a Gaianes, el Comtat. Entrada gratuïta.">
  <meta property="og:locale" content="ca_ES">

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Params.festivalName }} — Festival de música en valencià a Gaianes, el Comtat{{ else }}{{ .Title }} · {{ .Site.Params.festivalName }}{{ end }}">
  <meta name="twitter:description" content="{{ .Site.Params.descriptionLong }}">
  <meta name="twitter:image" content="{{ "img/og-image.jpg" | absURL }}">

  <!-- JSON-LD structured data (MusicEvent) -->
  {{ if .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MusicEvent",
    "name": "{{ .Site.Params.festivalName }}",
    "description": "{{ .Site.Params.descriptionLong }}",
    "url": "{{ .Site.BaseURL }}",
    "startDate": "2026-06-13T19:30:00+02:00",
    "endDate": "2026-06-13T23:59:00+02:00",
    "eventStatus": "https://schema.org/EventScheduled",
    "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
    "isAccessibleForFree": true,
    "location": {
      "@type": "Place",
      "name": "Gaianes",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Gaianes",
        "addressRegion": "el Comtat, País Valencià",
        "addressCountry": "ES"
      }
    },
    "organizer": {
      "@type": "Organization",
      "name": "{{ .Site.Params.organiser }}"
    },
    "image": "{{ "img/og-image.jpg" | absURL }}",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "EUR",
      "validFrom": "2026-01-01",
      "availability": "https://schema.org/InStock",
      "url": "{{ .Site.BaseURL }}"
    },
    "performer": [
      { "@type": "MusicGroup", "name": "Marcel el Marcià" },
      { "@type": "MusicGroup", "name": "Fardatxo" },
      { "@type": "MusicGroup", "name": "Invers" },
      { "@type": "MusicGroup", "name": "The Sgraciats" },
      { "@type": "MusicGroup", "name": "Arre A.K." },
      { "@type": "PerformingGroup", "name": "Muixeranga Penyeta Blanca" }
    ]
  }
  </script>
  {{ end }}

  <!-- Web app manifest -->
  <link rel="manifest" href="{{ "manifest.json" | relURL }}">
  <meta name="theme-color" content="#1a1a4a">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "favicon-32.png" | relURL }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ "favicon-16.png" | relURL }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ "favicon-180.png" | relURL }}">
</head>
<body>
  {{ partial "nav.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
