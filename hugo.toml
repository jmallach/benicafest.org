baseURL = "https://benicafest.org/"
languageCode = "ca"
title = "Benicafest"

[params]
  festivalName    = "Benicafest"
  edition         = "II"
  date            = "13 de juny de 2026"
  doors           = "19:30"
  concertStart    = "20:00"
  location        = "Gaianes, el Comtat"
  freeEntry       = true
  organiser       = "Una associació local de veïns i veïnes de Gaianes, amb el suport de l'Ajuntament"
  description     = "Festival de música en valencià a Gaianes, el Comtat. Entrada gratuïta."

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # allow HTML inside markdown if needed

# Sitemap
[sitemap]
  changefreq = "weekly"
  priority   = 0.5

# Enable robots.txt generation
enableRobotsTXT = true
